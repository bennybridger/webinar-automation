<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"></head>
<body style="font-family: Arial, Helvetica, sans-serif; margin: 0; padding: 0; background-color: #f4f4f7;">
  <div style="max-width: 600px; margin: 0 auto; background-color: #ffffff; padding: 32px 24px;">
    <div style="border-bottom: 2px solid #6c63ff; padding-bottom: 16px; margin-bottom: 24px;">
      <h2 style="color: #1a1a2e; margin: 0; font-size: 22px;">{{ subject }}</h2>
    </div>
    <div style="color: #374151; font-size: 15px; line-height: 1.6;">
      {{ body_html }}
    </div>
    <div style="text-align: center; margin: 32px 0;">
      <a href="{{ registration_link or webinar_link }}" style="background-color: #6c63ff; color: #ffffff; padding: 14px 28px; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 15px; display: inline-block;">
        Reserve Your Spot
      </a>
    </div>
    <div style="border-top: 1px solid #e5e7eb; padding-top: 16px; margin-top: 32px; color: #9ca3af; font-size: 12px;">
      <p>{{ sender_name }}</p>
    </div>
  </div>
</body>
</html>
